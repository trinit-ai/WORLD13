description: Hospital discharge planning intake for discharge planners, social workers, and clinical staff assessing a patient's discharge needs. Evaluates the clinical status, the patient's functional capacity, the home environment, the post-discharge care requirements, the support system, and the follow-up plan to produce a discharge planning profile with safe discharge criteria and post-discharge care coordination requirements. Not medical advice.
