id: pack_builder
name: Pack Builder
category: _meta
status: active
description: >
  Governs the creation of new protocol packs. Use when a domain expert
  wants to author a new pack, develop a stub into a full manifest, or
  refine an existing pack. Produces a complete MANIFEST.md and header.yaml
  as its deliverable. Do NOT use for running operational sessions — this
  pack builds other packs, it does not run them.
deliverable: pack_manifest
estimated_turns: 12-18
triggers:
  - build a pack
  - create a pack
  - develop a stub
  - author a protocol
  - new pack
  - write a manifest
excludes:
  - running existing packs (use load <pack_id>)
  - searching the library (use frontier)
version: "1.0"
author: Robert C. Ventura
