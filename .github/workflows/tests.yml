name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install anthropic fastapi pydantic python-dotenv pyyaml httpx uvicorn
          pip install pytest pytest-asyncio pytest-timeout ruff

      - name: Run tests
        run: python -m pytest tests/ -v --timeout=30

      - name: Lint (advisory)
        continue-on-error: true
        run: ruff check engine/ --select E,F --statistics
